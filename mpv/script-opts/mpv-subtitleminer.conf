# mpv-subtitleminer configuration
# Changes here take effect the next time mpv starts.

# Comma-separated list of ports to try for the WebSocket server.
# The server binds to the first available port.
ports=61777,61778,61779,61780,61781

# Start the server automatically when mpv opens.
auto_start=yes

# Tolerance in seconds when matching primary and secondary subtitle lines.
# Two lines match if their time ranges overlap within this margin.
secondary_match_threshold=0.5

# When multiple secondary subtitle lines overlap a single primary, append each
# additional line to the same card. Turn off to keep only the first matching
# secondary per primary.
append_secondary=yes

# ASS Style field filters (applied to primary and secondary subtitle tracks separately).
#
# style_allowlist: comma-separated list of style names to keep; lines with any
#   other style are dropped. Empty string disables allowlist filtering.
#   Default "Default" drops signs, songs, karaoke, OP/ED title cards, etc.
#   Set to empty to disable, or list exactly the styles you want to keep.
# style_blocklist: comma-separated list of style names to always drop.
#   Example: style_blocklist_primary=Signs,Karaoke
style_allowlist_primary=Default
style_allowlist_secondary=Default
style_blocklist_primary=
style_blocklist_secondary=

# ASS Name field filters.
#
# name_blocklist: comma-separated list of Name values to drop.
#   Example: name_blocklist_secondary=Sign,Song
# name_allowlist: comma-separated list of Name values to keep; lines with any
#   other name are dropped. Empty disables allowlist filtering.
name_blocklist_primary=
name_blocklist_secondary=
name_allowlist_primary=
name_allowlist_secondary=
